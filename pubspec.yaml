name: flutter_application_1
description: "TJAL PROTEGE — Sistema de Botão do Pânico"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_storage: ^12.3.4

  # Localização
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Background + conectividade + armazenamento local
  flutter_background_service: ^5.0.5
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.2

  # Notificações Push (FCM)
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Imagem de perfil
  image_picker: ^1.1.2

  # HTTP
  http: ^1.2.0

  # Navegação
  go_router: ^14.3.0

  # Estado
  provider: ^6.1.2

  # Animações
  flutter_animate: ^4.5.0

  # Utilitários
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/